<!DOCTYPE html>
<html>
<head>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden; /* Evita por completo el scroll horizontal en la web */
    }
    iframe { 
      width: 100%;        /* Cambiado de 100vw a 100% para evitar desbordamientos */
      height: 100%;       /* Cambiado de 100vh a 100% */
      border: none; 
      display: block; 
      overflow-x: hidden; /* Asegura que el iframe tampoco genere scroll horizontal */
    }
  </style>
</head>
<body>
  <iframe 
    src="https://copilotstudio.microsoft.com/environments/6b8fc458-4a99-e825-afb8-ecbd16a97c53/bots/cr1f8_PuertoEmplea/webchat?__version__=2"
    allow="microphone">
  </iframe>
</body>
</html>
