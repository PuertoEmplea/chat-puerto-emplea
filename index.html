<!DOCTYPE html>
<html>
<head>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box !important; 
    }
    html, body {
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important; /* Oculta TODO tipo de scroll (tanto horizontal como vertical) en la raíz */
    }
    iframe { 
      width: 100% !important;
      max-width: 100% !important; /* Evita estrictamente que el contenido de Copilot empuje los bordes */
      height: 100% !important;
      border: none; 
      display: block; 
      overflow: hidden !important;
    }
  </style>
</head>
<body>
  <iframe 
    src="https://copilotstudio.microsoft.com/environments/6b8fc458-4a99-e825-afb8-ecbd16a97c53/bots/cr1f8_PuertoEmplea/webchat?__version__=2"
    allow="microphone">
  </iframe>
</body>
</html>
